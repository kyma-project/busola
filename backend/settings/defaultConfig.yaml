config:
  # URL for the SAPUI5 Cloud Service instance. Required for GDC air-gapped deployments
  # where the SAPUI5 framework cannot be loaded from public CDNs.
  sapui5BootstrapUrl: ''
  features:
    GZIP:
      isEnabled: true
    JWT_CHECK_CONFIG:
      isEnabled: false
      config:
        issuer: https://apskyxzcl.accounts400.ondemand.com
        jwksUri: https://apskyxzcl.accounts400.ondemand.com/oauth2/certs
        clientId: ''
    KYMA_COMPANION:
      config:
        apiBaseUrl: 'https://companion.cp.dev.kyma.cloud.sap'
        tokenUrl: 'https://kymatest.accounts400.ondemand.com/oauth2/token'
        issuerUrl: 'https://kymatest.accounts400.ondemand.com'
        skipAuth: false
    ALLOW_PRIVATE_IPS:
      isEnabled: false
