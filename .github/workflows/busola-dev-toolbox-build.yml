name: Busola Dev Toolbox Build

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/busola-dev-toolbox-build.yml'
      - 'Dockerfile.dev-toolbox'
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/busola-dev-toolbox-build.yml'
      - 'Dockerfile.dev-toolbox'

concurrency:
  group: busola-dev-toolbox-build-${{ github.workflow_ref }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write # This is required for requesting the JWT token
  contents: read # This is required for actions/checkout

jobs:
  approve-run:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'pull_request_target' && 'restricted' || 'no-restricted' }}
    steps:
      - name: Approved
        run: echo "Build approved, environment selected"

  build-dev-toolbox-image:
    name: Build Image
    needs: approve-run
    uses: kyma-project/test-infra/.github/workflows/image-builder.yml@main # Usage: https://github.com/kyma-project/test-infra/tree/main/.github/actions/image-builder
    if: github.event.pull_request.draft == false
    with:
      name: busola-dev-toolbox
      dockerfile: Dockerfile.dev-toolbox
      tags: ${{ inputs.tag != '' && inputs.tag || 'latest' }}

  extract-image-tag:
    name: Extract image tag
    runs-on: ubuntu-latest
    needs: build-dev-toolbox-image
    outputs:
      image_tag: ${{ steps.extract_tag.outputs.image_tag }}
    steps:
      - name: Extract tag from built images
        id: extract_tag
        shell: bash
        run: |
          images='${{ needs.build-dev-toolbox-image.outputs.images }}'
          tag=$(echo "$images" | jq -r '.[]' | grep -v ':latest' | awk -F: '{print $NF}' | head -n1)
          echo "image_tag=$tag" >> $GITHUB_OUTPUT
