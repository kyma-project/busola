name: PR Unit and Component Tests

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'cypress/**'
      - 'cypress.config.component.ts'
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/pull-unit-tests.yml'
      - 'public/**'
      - 'src/**'
      - 'backend/**'
      - 'package.json'
      - 'cypress/**'
      - 'cypress.config.component.ts'
  merge_group:
  workflow_call:
    inputs:
      trigger_env:
        type: string
        required: false

jobs:
  run-unit-and-component-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.event.pull_request.draft == false
    steps:
      - uses: gardenlinux/workflow-telemetry-action@v2
        with:
          comment_on_pr: false
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Merge with latest main
        if: inputs.trigger_env != 'release-trigger'
        uses: ./.github/actions/merge
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: setup_busola
        shell: bash
        run: |
          set -e
          npm ci
      - name: run_unit_tests
        shell: bash
        run: |
          npm run test
      - name: run_component_tests
        shell: bash
        run: |
          npm run component-test-headless
      - name: merge_coverage_reports
        shell: bash
        run: |
          npm run coverage:merge
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          files: ./coverage/unit/lcov.info ./coverage/component/lcov.info
          fail-on-error: false
      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
      - name: Generate summary
        if: success() || failure()
        run: |
          pct() {
            local file=$1
            local lf=$(grep -h '^LF:' "$file" | awk -F: '{s+=$2} END {print s}')
            local lh=$(grep -h '^LH:' "$file" | awk -F: '{s+=$2} END {print s}')
            [ "$lf" -gt 0 ] && echo "scale=1; $lh * 100 / $lf" | bc || echo "N/A"
          }
          {
            echo '# PR Unit and Component Tests'
            echo '## Coverage'
            echo "- Unit: $(pct coverage/unit/lcov.info)% — available in artifacts"
            echo "- Component: $(pct coverage/component/lcov.info)% — available in artifacts"
            echo "- Merged: $(pct coverage/merged/lcov.info)% — available in artifacts"
          } >> $GITHUB_STEP_SUMMARY
